<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="55%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="55%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- QR icon big -->
  <g transform="translate(760, 115)">
    <!-- Outer frame -->
    <rect width="325" height="325" rx="28" fill="url(#brand)" opacity="0.15"/>
    <rect x="10" y="10" width="305" height="305" rx="20" fill="none" stroke="url(#brand)" stroke-width="2" opacity="0.3"/>

    <!-- Top-left corner square -->
    <rect x="40" y="40" width="90" height="90" rx="10" fill="white" opacity="0.9"/>
    <rect x="56" y="56" width="58" height="58" rx="6" fill="url(#brand)"/>

    <!-- Top-right corner square -->
    <rect x="195" y="40" width="90" height="90" rx="10" fill="white" opacity="0.9"/>
    <rect x="211" y="56" width="58" height="58" rx="6" fill="url(#brand)"/>

    <!-- Bottom-left corner square -->
    <rect x="40" y="195" width="90" height="90" rx="10" fill="white" opacity="0.9"/>
    <rect x="56" y="211" width="58" height="58" rx="6" fill="url(#brand)"/>

    <!-- Data dots bottom-right -->
    <rect x="195" y="195" width="36" height="36" rx="4" fill="white" opacity="0.7"/>
    <rect x="249" y="195" width="36" height="36" rx="4" fill="white" opacity="0.7"/>
    <rect x="195" y="249" width="36" height="36" rx="4" fill="white" opacity="0.7"/>
    <rect x="249" y="249" width="36" height="36" rx="4" fill="white" opacity="0.5"/>

    <!-- Middle dots -->
    <rect x="150" y="40" width="20" height="20" rx="3" fill="white" opacity="0.4"/>
    <rect x="150" y="70" width="20" height="20" rx="3" fill="white" opacity="0.3"/>
    <rect x="40" y="150" width="20" height="20" rx="3" fill="white" opacity="0.4"/>
    <rect x="70" y="150" width="20" height="20" rx="3" fill="white" opacity="0.3"/>
  </g>

  <!-- Mock business card -->
  <g transform="translate(80, 160)">
    <rect width="560" height="310" rx="18" fill="white" opacity="0.06"/>
    <rect width="560" height="310" rx="18" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>
    <!-- Card gradient bar -->
    <rect x="0" y="0" width="560" height="8" rx="18" fill="url(#accent)"/>
    <rect x="0" y="8" width="560" height="0" fill="url(#accent)"/>

    <!-- Name placeholder -->
    <rect x="40" y="55" width="220" height="28" rx="6" fill="white" opacity="0.15"/>
    <rect x="40" y="95" width="160" height="18" rx="4" fill="white" opacity="0.08"/>

    <!-- Contact lines -->
    <rect x="40" y="155" width="190" height="12" rx="3" fill="white" opacity="0.1"/>
    <rect x="40" y="178" width="210" height="12" rx="3" fill="white" opacity="0.1"/>
    <rect x="40" y="201" width="170" height="12" rx="3" fill="white" opacity="0.1"/>

    <!-- QR placeholder on card -->
    <rect x="430" y="55" width="90" height="90" rx="8" fill="white" opacity="0.1"/>
    <rect x="440" y="65" width="70" height="70" rx="5" fill="url(#brand)" opacity="0.4"/>
  </g>

  <!-- Main headline -->
  <text x="80" y="530" font-family="Georgia, serif" font-size="72" font-weight="700" fill="white" letter-spacing="-1">Vizitkář</text>

  <!-- Gradient line under title -->
  <rect x="80" y="545" width="340" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="80" y="590" font-family="-apple-system, Arial, sans-serif" font-size="26" fill="white" opacity="0.6" letter-spacing="0.5">Vytvořte digitální vizitku s&nbsp;QR kódem</text>

  <!-- URL -->
  <text x="80" y="620" font-family="-apple-system, Arial, sans-serif" font-size="18" fill="white" opacity="0.35">vizitkar.vercel.app</text>
</svg>
